{{ $year := .Get "year" }}
{{ $data := index hugo.Data $year "round_breakdown" }}
{{ if $data }}
<h2>Points by Round</h2>
<div id="round-breakdown-{{ $year }}"></div>

<h2>Players by Round</h2>
<div id="players-by-round-{{ $year }}"></div>
<script type="module">
import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm";

const OWNER_COLORS = {
  'Ross': '#4e79a7', 'Tilo': '#f28e2b', 'Jared': '#e15759',
  'AJ': '#76b7b2', 'Jawad': '#59a14f', 'Netten': '#edc948'
};

const data = JSON.parse({{ $data | jsonify }});

const chart = Plot.plot({
  marginLeft: 70,
  style: { background: "transparent", color: "#dfe2eb", fontSize: "14px" },
  x: { label: "Points", grid: true },
  y: { label: null },
  color: {
    domain: [1, 2, 3, 4, 5, 6, 7],
    range: ["#e9c400", "#f28e2b", "#e15759", "#59a14f", "#76b7b2", "#b07aa1", "#4e79a7"],
    legend: true,
    label: "Round",
  },
  marks: [
    Plot.barX(data, Plot.stackX({
      x: "points",
      y: "owner",
      fill: "round",
      sort: { y: null },
      order: "round",
      title: d => `Round ${d.round}: ${d.points} pts (${d.picks} picks)`,
    })),
    Plot.ruleX([0]),
  ],
});
document.getElementById("round-breakdown-{{ $year }}").append(chart);

// Players by round — heatmap
// Fill in zeros for missing owner/round combos so every cell renders
const owners = [...new Set(data.map(d => d.owner))];
const rounds = [1, 2, 3, 4, 5, 6, 7];
const pickMap = new Map(data.map(d => [`${d.owner}|${d.round}`, d.picks]));
const heatData = owners.flatMap(owner =>
  rounds.map(round => ({
    owner,
    round,
    picks: pickMap.get(`${owner}|${round}`) ?? 0,
  }))
);
const maxPicks = Math.max(...heatData.map(d => d.picks));

const playersChart = Plot.plot({
  marginLeft: 70,
  marginRight: 10,
  style: { background: "transparent", color: "#dfe2eb", fontSize: "14px" },
  x: { label: "Round", domain: rounds, tickFormat: d => `R${d}`, padding: 0 },
  y: { label: null, padding: 0 },
  color: {
    type: "linear",
    domain: [0, maxPicks],
    range: ["#1c2026", "#4e79a7"],
    label: "Players",
    legend: true,
  },
  marks: [
    Plot.cell(heatData, {
      x: "round",
      y: "owner",
      fill: "picks",
      inset: 1,
      title: d => `${d.owner} — Round ${d.round}: ${d.picks} player${d.picks !== 1 ? 's' : ''}`,
    }),
    Plot.text(heatData, {
      x: "round",
      y: "owner",
      text: d => d.picks > 0 ? d.picks.toString() : "",
      fill: d => d.picks > maxPicks * 0.5 ? "#fff" : "#c4c6cf",
      fontSize: 13,
      fontWeight: "600",
    }),
  ],
});
document.getElementById("players-by-round-{{ $year }}").append(playersChart);
</script>
{{ else }}
<p>No round breakdown data available yet.</p>
{{ end }}
